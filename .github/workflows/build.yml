name: Build and Release
on: [push]

jobs:
  build-and-release:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set Release Tag
        run: echo "RELEASE_TAG=$(date +'%Y.%m.%d-%H%M')" >> $GITHUB_ENV

      - name: Build App
        run: |
          xcodebuild build \
            -scheme "Example App" \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO

      - name: Create IPA
        run: |
          mkdir -p Payload
          APP_PATH=$(find build -name "*.app" | head -n 1)
          cp -r "$APP_PATH" Payload/
          zip -r YourApp.ipa Payload

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: Build ${{ env.RELEASE_TAG }}
          files: YourApp.ipa
          draft: false
          prerelease: false
